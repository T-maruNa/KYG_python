name: Blog Preview

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
  workflow_dispatch:

jobs:
  generate-preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai python-dotenv

      - name: Generate blog preview
        env:
          GEMINI_STOCK_API_KEY: ${{ secrets.GEMINI_STOCK_API_KEY }}
        run: python tests/generate_blog_preview.py

      - name: Upload blog preview
        uses: actions/upload-artifact@v4
        with:
          name: blog-preview
          path: tests/blog_preview.html
          retention-days: 7
